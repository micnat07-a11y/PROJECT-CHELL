<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealPrep - Fridge Guardian</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7FB77E">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { background-color: #f9fafb; min-height: 100vh; color: #333; }
    
    #loginOverlay { position: fixed; inset: 0; background: #7FB77E; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    .login-card { background: white; padding: 2.5rem; border-radius: 1.5rem; width: 90%; max-width: 400px; text-align: center; }

    header { background-color: #7FB77E; color: white; padding: 2rem 1rem; border-bottom-left-radius: 1.5rem; border-bottom-right-radius: 1.5rem; text-align: center; }
    h1 { font-family: 'Pacifico', cursive; font-size: 2rem; }
    
    main { padding: 1rem; max-width: 28rem; margin: 0 auto; }
    .card { background: white; padding: 1.5rem; border-radius: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    
    .btn-primary { width: 100%; background: #7FB77E; color: white; border: none; padding: 0.8rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; margin-top: 0.5rem; }
    .btn-primary:active { transform: scale(0.98); }

    .input-group { margin-bottom: 1rem; }
    input[type="text"] { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 0.5rem; outline: none; }

    .recipe-result { margin-top: 1rem; display: none; border-top: 2px dashed #eee; padding-top: 1rem; }
    .recipe-item { background: #f0fdf4; border-radius: 0.8rem; padding: 1rem; margin-top: 0.5rem; border: 1px solid #dcfce7; }
    .calories { color: #16a34a; font-weight: bold; font-size: 1.1rem; }

    .inventory-item { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #f3f4f6; }
    .hidden { display: none !important; }
    .badge { background: #EF4444; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div class="login-card">
    <h2 style="color:#7FB77E; font-family:'Pacifico'; margin-bottom:1rem; font-size: 2.5rem;">MealPrep</h2>
    <input type="text" id="accName" placeholder="Siapa nama kamu?">
    <button onclick="handleLogin()" class="btn-primary">Mulai Masak</button>
  </div>
</div>

<header>
  <h1>MealPrep</h1>
  <p id="welcomeUser">Hemat bahan • Resep Sehat</p>
</header>

<main>
  <section class="card">
    <h3>📸 Scan Struk</h3>
    <input type="file" id="scanBill" accept="image/*" capture="environment" class="hidden">
    <button id="btnScan" onclick="document.getElementById('scanBill').click()" class="btn-primary">Ambil Foto Struk</button>
    <p id="statusOCR" style="font-size:0.7rem; color:#7FB77E; text-align:center; margin-top:0.4rem;"></p>
  </section>

  <section class="card">
    <h3 style="margin-bottom: 0.5rem;">🍳 Cari Resep</h3>
    <p style="font-size: 0.8rem; color: #666; margin-bottom: 0.8rem;">Punya bahan apa hari ini?</p>
    <div class="input-group">
      <input type="text" id="ingredientInput" placeholder="Contoh: Ayam, Telur, Susu...">
      <button onclick="getRecommendation()" class="btn-primary" style="background: #fbbf24; color: #92400e;">Cek Rekomendasi</button>
    </div>

    <div id="recipeDisplay" class="recipe-result">
      <p style="font-weight: bold; font-size: 0.9rem;">Rekomendasi Menu:</p>
      <div id="recipeContent"></div>
    </div>
  </section>

  <section class="card">
    <h3 style="margin-bottom: 0.5rem;">🧊 Isi Kulkas</h3>
    <div id="inventoryList">
      <p style="font-size: 0.8rem; color: #999; text-align: center;">Kulkas masih kosong.</p>
    </div>
  </section>
</main>

<script>
  // Database Resep Sederhana
  const recipes = [
    { ingredients: ['AYAM', 'MENTEGA'], name: 'Tumis Ayam Mentega', calories: 450, time: '20 Menit' },
    { ingredients: ['AYAM', 'TELUR'], name: 'Ayam Goreng Tepung', calories: 520, time: '30 Menit' },
    { ingredients: ['SUSU', 'TELUR'], name: 'Puding Susu Lembut', calories: 210, time: '15 Menit' },
    { ingredients: ['TELUR'], name: 'Telur Dadar Sayur', calories: 150, time: '10 Menit' },
    { ingredients: ['SUSU', 'OAT'], name: 'Creamy Oatmeal', calories: 280, time: '5 Menit' }
  ];

  function handleLogin() {
    const name = document.getElementById('accName').value;
    if(name.trim()) {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('welcomeUser').innerText = `Halo, ${name}!`;
    }
  }

  function getRecommendation() {
    const input = document.getElementById('ingredientInput').value.toUpperCase();
    const display = document.getElementById('recipeDisplay');
    const content = document.getElementById('recipeContent');
    
    content.innerHTML = ""; // Bersihkan hasil sebelumnya
    
    // Cari resep yang cocok dengan input user
    const matchedRecipes = recipes.filter(r => 
      r.ingredients.some(ing => input.includes(ing))
    );

    if(matchedRecipes.length > 0) {
      display.style.display = 'block';
      matchedRecipes.forEach(res => {
        content.innerHTML += `
          <div class="recipe-item">
            <p style="font-weight:bold; color:#166534;">${res.name}</p>
            <p style="font-size:0.8rem; color:#666;">Estimasi: ${res.time}</p>
            <p class="calories">${res.calories} <span style="font-size:0.7rem;">kkal</span></p>
          </div>
        `;
      });
    } else {
      display.style.display = 'block';
      content.innerHTML = `<p style="font-size:0.8rem; color:red;">Maaf, bahan belum tersedia di database kami.</p>`;
    }
  }

  // Integrasi OCR Struk
  document.getElementById('scanBill').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    const status = document.getElementById('statusOCR');
    if (!file) return;

    status.innerText = "Sedang membaca struk...";
    
    try {
      const { data: { text } } = await Tesseract.recognize(file, 'ind');
      const scanText = text.toUpperCase();
      
      // Auto-fill ke input resep jika ada kata kunci
      if(scanText.includes('AYAM')) document.getElementById('ingredientInput').value = "Ayam";
      
      const invList = document.getElementById('inventoryList');
      invList.innerHTML = `
        <div class="inventory-item">
          <span style="font-size:0.9rem;">📦 Barang dari Struk</span>
          <span class="badge" style="background:#10B981">Tersimpan</span>
        </div>
      `;
      status.innerText = "Scan selesai! Coba cek rekomendasi resep.";
    } catch (err) {
      status.innerText = "Gagal memproses gambar.";
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
