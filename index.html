<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MealPrep - Fridge Guardian</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#7FB77E">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    body { background-color: #f9fafb; min-height: 100vh; }
    header { background-color: #7FB77E; color: white; padding: 2rem 1rem; border-bottom-left-radius: 1.5rem; border-bottom-right-radius: 1.5rem; text-align: center; }
    h1 { font-family: 'Pacifico', cursive; font-size: 2rem; }
    main { padding: 1rem; max-width: 28rem; margin: 0 auto; }
    .card { background: white; padding: 1.5rem; border-radius: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn-primary { width: 100%; background: #7FB77E; color: white; border: none; padding: 0.8rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; }
    .btn-primary:disabled { background: #ccc; }
    .inventory-item { display: flex; justify-content: space-between; padding: 0.8rem; border-bottom: 1px solid #eee; }
    .item-name { font-weight: 600; font-size: 0.9rem; }
    .item-exp { font-size: 0.75rem; color: #666; }
    .badge { background: #EF4444; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; }
    #loginOverlay { position: fixed; inset: 0; background: #7FB77E; z-index: 100; display: flex; align-items: center; justify-content: center; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div id="loginOverlay">
  <div style="background:white; padding:2rem; border-radius:1rem; width:80%;">
    <h2 style="text-align:center; color:#7FB77E; font-family:'Pacifico'; margin-bottom:1rem;">MealPrep</h2>
    <input type="text" id="accName" placeholder="Masukkan Nama" style="width:100%; padding:0.8rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:0.5rem;">
    <button onclick="login()" class="btn-primary">Masuk</button>
  </div>
</div>

<header>
  <h1 id="brandTitle">MealPrep</h1>
  <p id="welcomeUser">Hemat bahan • Resep Sehat</p>
</header>

<main>
  <section class="card">
    <h3>📸 Scan Struk Belanja</h3>
    <p style="font-size:0.8rem; color:#666; margin-bottom:1rem;">Otomatis masukkan barang ke kulkas.</p>
    <input type="file" id="scanBill" accept="image/*" capture="environment" class="hidden">
    <button id="btnScan" onclick="document.getElementById('scanBill').click()" class="btn-primary">Ambil Foto Struk</button>
    <p id="statusOCR" style="font-size:0.7rem; color:blue; margin-top:0.5rem; text-align:center;"></p>
  </section>

  <section class="card">
    <h3>🧊 Isi Kulkas</h3>
    <div id="inventoryList">
      <div class="inventory-item">
        <div><p class="item-name">Susu UHT</p><p class="item-exp">Exp: 25 Apr 2026</p></div>
        <span class="badge">H-3</span>
      </div>
    </div>
  </section>
</main>

<script>
  function login() {
    const name = document.getElementById('accName').value;
    if(name) {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('welcomeUser').innerText = "Halo, " + name + "!";
    }
  }

  // LOGIKA SCAN STRUK (OCR)
  document.getElementById('scanBill').addEventListener('change', async function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const btn = document.getElementById('btnScan');
    const status = document.getElementById('statusOCR');

    btn.disabled = true;
    btn.innerText = "Membaca Struk...";
    status.innerText = "Memproses gambar dengan AI...";

    try {
      const { data: { text } } = await Tesseract.recognize(file, 'ind');
      console.log("Hasil Scan:", text.toUpperCase());

      // Kamus pencarian kata
      const items = [
        { key: 'SUSU', name: 'Susu Segar', emoji: '🥛' },
        { key: 'AYAM', name: 'Daging Ayam', emoji: '🍗' },
        { key: 'TELUR', name: 'Telur Pack', emoji: '🥚' },
        { key: 'MIE', name: 'Mie Instan', emoji: '🍜' }
      ];

      let found = 0;
      items.forEach(item => {
        if (text.toUpperCase().includes(item.key)) {
          addItem(item.name, item.emoji);
          found++;
        }
      });

      status.innerText = found > 0 ? `Berhasil scan ${found} barang!` : "Tidak ada barang yang dikenali.";
    } catch (err) {
      status.innerText = "Error saat membaca struk.";
    } finally {
      btn.disabled = false;
      btn.innerText = "Ambil Foto Struk";
    }
  });

  function addItem(name, emoji) {
    const list = document.getElementById('inventoryList');
    const div = document.createElement('div');
    div.className = 'inventory-item';
    div.innerHTML = `<div><p class="item-name">${emoji} ${name}</p><p class="item-exp">Exp: 7 Hari lagi</p></div><span class="badge" style="background:#10B981">BARU</span>`;
    list.prepend(div);
  }

  // Service Worker (Agar PWA Jalan)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(() => console.log("SW OK"));
  }
</script>
</body>
</html>
